apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor

metadata:
  name: fastapi-servicemonitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack

spec:
  selector:
    matchLabels:
      app: fastapi-observability

  namespaceSelector:
    matchNames:
      - observability-poc

  endpoints:
    - port: http
      path: /metrics
      interval: 15s